watch_stylesheet: true
watch_config: true
debug: false
update_check: true # Enable automatic update check.
glazewm:
  start_command: "glazewm.exe start"
  stop_command: "glazewm.exe command wm-exit"
  reload_command: "glazewm.exe command wm-exit && glazewm.exe start"
bars:
  primary-bar:
    enabled: true
    screens: ["primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    animation:
      enabled: true
      duration: 1000
    blur_effect:
      enabled: true
      acrylic: true
      dark_mode: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "#8dbcff"
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 26
    padding:
      top: 3
      left: 3
      bottom: 0
      right: 3
    widgets:
      left: [
        "glazewm_tiling_direction",
        "glazewm_workspaces",      
        "active_window"
      ]
      center: [
        "clock"
      ]
      right: [
        "cava",
        "weather",
        "microphone",
        "volume",
        "cpu",
        "memory",
        "github",
        "wallpapers",
        "systray"
        ]
widgets:
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[process][name]}"
      label_alt: "{win[title]}"
      label_no_window: ""
      label_icon: true
      label_icon_size: 14
      max_length: 46
      max_length_ellipsis: "..."
      monitor_exclusive: true
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%I:%M:%S}"
      label_alt: "{%I:%M:%S}"
      timezones: []
      callbacks:
        on_left: ""
  weather:
    type: "yasb.weather.WeatherWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      api_key: c250de91b6344cf69b432502261103
      update_interval: 600
      hide_decimal: true
      location: United States, Elizabethtown, KY 42701 # You can use "USA Los Angeles 90006" {COUNTRY CITY ZIP_CODE}, or just city.
      callbacks:
        on_left: "toggle_card"
      icons:
        sunnyDay: "\ue30d"
        clearNight: "\ue32b"
        cloudyDay: "\ue312"
        cloudyNight: "\ue311"
        rainyDay: "\ue308"
        rainyNight: "\ue333"
        blizzardDay: "\udb83\udf36"
        blizzardNight: "\udb83\udf36"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\uebaa"
      weather_card:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        icon_size: 64
        show_hourly_forecast: True # Set to False to disable hourly forecast
        time_format: "12h" # can be 12h or 24h
        hourly_point_spacing: 76
        hourly_icon_size: 32 # better to set 16, 32 or 64 for better quality
        icon_smoothing: true # should be true for smoother icon or false for sharper icon if using 16, 32 or 64 for hourly_icon_size
        temp_line_width: 2 # can be 0 to hide the temperature line
        current_line_color: "#8EAEE8"
        current_line_width: 1 # can be 0 to hide the current hour line
        current_line_style: "dot"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  github:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span style='font-size:16px; color:#ffffff;'>\uf09b</span>"
      label_alt: "<span style='font-size:16px; color:#ffffff;'>\uf09b</span> repos"
      class_name: "github-widget"
      tooltip: true
      callbacks:
        on_left: "exec cmd.exe /c start https://github.com/yourpov?tab=repositories"
        on_middle: "toggle_label"
        on_right: "exec cmd.exe /c start https://github.com/yourpov"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb80\udd1b</span>"
      image_path: C:\Users\pov\Pictures\Wallpapers # Example path to folder with images
      change_automatically: false # Automatically change wallpaper
      update_interval: 60 # If change_automatically is true, update interval in seconds
      gallery:
          enabled: true
          blur: true
          image_width: 220
          image_per_page: 8
          show_buttons: false
          orientation: "portrait"
          image_spacing: 8
          lazy_load: true
          lazy_load_delay: 80
          lazy_load_fadein: 400
          image_corner_radius: 20
          enable_cache: true
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      min_bar_height: 0
      gradient: 1
      reverse: 0
      foreground: "#89b4fa"
      gradient_color_1: '#74c7ec'
      gradient_color_2: '#89b4fa'
      gradient_color_3: '#cba6f7'
      bars_number: 8
      bar_spacing: 2
      bar_width: 4
      hide_empty: true
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  cpu:
      type: "yasb.cpu.CpuWidget"
      options:
        label: "{info[percent][total]:.0f}%"
        progress_bar:
          enabled: true
          position: "left"
          size: 16
          thickness: 3
          color: "#89dceb"
          background_color: "#1e1e2e"
          animation: true 
        animation:
          enabled: true
          type: FadeInOut
          duration: 200
        update_interval: 2000
        callbacks:
          on_right: "do_nothing"
          on_left: "do_nothing"
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      # Offline behavior (matching komorebi's label_offline and hide_if_offline)
      offline_label: "Hey Buddy, GlazeWM is Offline"
      hide_if_offline: false
      
      # Workspace display labels (matching komorebi's label_workspace_btn and label_workspace_active_btn)
      populated_label: "\udb85\udcfc"
      empty_label: "\udb85\udcfc"
      active_populated_label: "\udb85\udcfb"
      active_empty_label: "\udb85\udcfb"
      
      # Workspace management (matching komorebi's hide_empty_workspaces)
      hide_empty_workspaces: false
      
      # Server connection
      glazewm_server_uri: "ws://localhost:6123"
      
      # Additional GlazeWM-specific options (keeping defaults)
      enable_scroll_switching: true
      reverse_scroll_direction: true
  glazewm_tiling_direction:
    type: "glazewm.tiling_direction.GlazewmTilingDirectionWidget"
    options:
      horizontal_label: "\ueb56"
      vertical_label: "\ueb57"
      btn_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  microphone:
    type: "yasb.microphone.MicrophoneWidget"
    options:
      label: "<span style='font-size:16px; color:#ffffff;'>{icon}</span>"
      label_alt: "<span style='font-size:16px; color:#ffffff;'>{icon}</span> {level}"
      tooltip: true
      scroll_step: 2
      icons:
        normal: "\uf130"
        muted: "\uf131"
      callbacks:
        on_left: "toggle_mute"
        on_middle: "toggle_label"
        on_right: "toggle_mic_menu"
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span style='font-size:14px'>{icon}</span> {level}%"
      label_alt: "{volume}"
      tooltip: true
      scroll_step: 2
      volume_icons:
        - "\ueee8"
        - "\uf026"
        - "\uf027"
        - "\uf027"
        - "\uf028"
      callbacks:
        on_left: "toggle_mute"
        on_middle: "toggle_volume_menu"
        on_right: "exec cmd.exe /c start ms-settings:sound"
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "\udb81\udc52"
      label_expanded: "\udb81\udc54"
      label_position: "left"
      icon_size: 16
      pin_click_modifier: "alt"
      show_unpinned: false
      show_unpinned_button: true
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "{virtual_mem_percent}%"
      update_interval: 5000
      progress_bar:
        enabled: true
        size: 16
        thickness: 3
        position: left
        color: "#cba6f7"
        background_color: "#1e1e2e"
        animation: True
      animation:
        enabled: true
        type: FadeInOut
        duration: 200 
      callbacks:
        on_left: "do_nothing"
      memory_thresholds:
        low: 25
        medium: 50
        high: 90
